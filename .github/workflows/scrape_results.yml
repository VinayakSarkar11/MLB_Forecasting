name: Scrape MLB Results

on:
  schedule:
    # 11:00 PM PDT = 06:00 UTC next day (baseball season runs on PDT, UTC-7)
    - cron: '0 6 * * *'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-scraper.txt

      - name: Download DB from S3
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p data
          python - <<'PYEOF'
          import boto3, os, sys
          from pathlib import Path
          s3 = boto3.client('s3',
              aws_access_key_id=os.environ['AWS_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['AWS_SECRET_ACCESS_KEY'],
              region_name='us-east-1',
          )
          try:
              s3.download_file('statcast-surge-raw-data-vs', 'prizepicks/prizepicks_history.db', 'data/prizepicks_history.db')
              print('DB downloaded from S3.')
          except Exception as e:
              print(f'No existing DB or download failed: {e}')
          PYEOF

      - name: Run scraper (yesterday's games — this job runs at 6 AM UTC = 11 PM PDT prev day)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          YESTERDAY=$(date -d "yesterday" '+%Y-%m-%d')
          python -m src.prizepicks.scrape_results --date "$YESTERDAY"

      - name: Upload DB to S3
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          python - <<'PYEOF'
          import boto3, os, sys
          from pathlib import Path
          db = Path('data/prizepicks_history.db')
          if not db.exists():
              print('ERROR: DB file not found at data/prizepicks_history.db')
              sys.exit(1)
          s3 = boto3.client('s3',
              aws_access_key_id=os.environ['AWS_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['AWS_SECRET_ACCESS_KEY'],
              region_name='us-east-1',
          )
          s3.upload_file(str(db), 'statcast-surge-raw-data-vs', 'prizepicks/prizepicks_history.db')
          print(f'DB uploaded to S3 ({db.stat().st_size:,} bytes).')
          PYEOF
